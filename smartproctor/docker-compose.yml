version: '3.8'

services:
  # PostgreSQL Veritabanı
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartproctor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init_schema.sql:/docker-entrypoint-initdb.d/01_init.sql

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/smartproctor
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/smartproctor
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - evidence_data:/app/static/evidence

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  evidence_data:
